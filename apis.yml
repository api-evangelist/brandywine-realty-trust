name: Brandywine Realty Trust
description: >-
  Brandywine Realty Trust (NYSE: BDN) is a publicly traded, fully integrated
  real estate investment trust (REIT) headquartered at Cira Centre in
  Philadelphia. The company owns, develops, leases, and manages a roughly
  22 million square foot portfolio of office, life science, mixed-use,
  multifamily, retail, and education properties concentrated in the Greater
  Philadelphia, Austin, and Washington, D.C. markets. Brandywine is the
  developer behind Schuylkill Yards, uCity Square, Uptown ATX, Broadmoor,
  and Discovery Point, and has delivered roughly $2.6 billion and 12.1 million
  square feet of ground-up developments, master-planned communities, and
  adaptive reuse projects over a 30+ year operating history.
